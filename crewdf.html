<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CREW DF | Dolanan Film</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet" />
    <style>
      :root {
        --accent-gold: #c5a059;
        --primary-dark: #0a0a0a;
        --secondary-dark: #151515;
        --text-light: #ffffff;
        --text-gray: #a0a0a0;
      }

      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        background-color: var(--primary-dark);
        color: var(--text-light);
        font-family: 'Montserrat', sans-serif;
        line-height: 1.6;
        overflow-x: hidden;
      }

      /* --- NAVIGASI ATAS --- */
      .top-nav {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 20px 5%;
        position: fixed;
        top: 0;
        width: 100%;
        background: rgba(10, 10, 10, 0.95);
        backdrop-filter: blur(10px);
        z-index: 1000;
        border-bottom: 1px solid rgba(197, 160, 89, 0.2);
      }

      .nav-brand { display: flex; align-items: center; gap: 12px; text-decoration: none; }
      .logo-img { width: 35px; height: 35px; object-fit: contain; }
      .logo-text { color: var(--accent-gold); font-weight: 900; font-size: 1rem; letter-spacing: 1px; }

      .btn-back-top {
        color: var(--text-light);
        text-decoration: none;
        font-weight: 700;
        font-size: 0.8rem;
        text-transform: uppercase;
        border: 1px solid var(--accent-gold);
        padding: 8px 15px;
        border-radius: 5px;
        transition: 0.3s;
      }
      .btn-back-top:hover { background: var(--accent-gold); color: #000; }

      /* --- HEADER SECTION --- */
      .crew-header {
        padding: 150px 5% 60px;
        text-align: center;
      }

      .title-gold {
        font-size: clamp(2rem, 7vw, 3.5rem);
        font-weight: 900;
        color: var(--accent-gold);
        letter-spacing: 5px;
        margin-bottom: 30px;
        text-transform: uppercase;
      }

      .description-box {
        max-width: 800px;
        margin: 0 auto 50px;
        color: var(--text-gray);
        font-size: 1rem;
        text-align: center;
      }

      .vision-mission-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
        gap: 25px;
        max-width: 1000px;
        margin: 0 auto;
      }

      .vm-card {
        background: var(--secondary-dark);
        padding: 30px;
        border-radius: 15px;
        border-left: 5px solid var(--accent-gold);
        text-align: left;
      }
      .vm-card h3 { color: var(--accent-gold); margin-bottom: 10px; font-weight: 900; }

      

      /* --- CREW GRID DENGAN BINGKAI --- */
      .crew-section { padding: 80px 5%; max-width: 1200px; margin: 0 auto; }
      
      .crew-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
        gap: 30px;
      }

      .crew-card {
        background: var(--secondary-dark);
        padding: 15px;
        border-radius: 20px;
        border: 1px solid rgba(197, 160, 89, 0.2);
        transition: 0.4s;
        text-align: center;
      }

      .crew-img-wrapper {
        width: 100%;
        aspect-ratio: 3/4;
        border-radius: 12px;
        overflow: hidden;
        margin-bottom: 15px;
        border: 2px solid var(--accent-gold);
      }

      .crew-img-wrapper img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        filter: grayscale(100%);
        transition: 0.5s;
      }

      .crew-card:hover { border-color: var(--accent-gold); transform: translateY(-10px); }
      .crew-card:hover img { filter: grayscale(0%); transform: scale(1.05); }

      .crew-info h4 { font-size: 1.2rem; font-weight: 900; margin-bottom: 5px; }
      .crew-info p { color: var(--accent-gold); font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }

      /* --- FOOTER & BACK BUTTON --- */
      .footer-actions {
        padding: 60px 5%;
        text-align: center;
      }

      .btn-back-bottom {
        display: inline-block;
        border: 2px solid var(--accent-gold);
        padding: 12px 30px;
        border-radius: 50px;
        text-decoration: none;
        color: var(--accent-gold);
        font-weight: 900;
        text-transform: uppercase;
        letter-spacing: 2px;
        font-size: 0.8rem;
        transition: 0.3s;
      }
      .btn-back-bottom:hover { background: var(--accent-gold); color: #000; }

      @media (max-width: 768px) {
        .crew-grid { grid-template-columns: repeat(2, 1fr); gap: 15px; }
        .top-nav { padding: 15px 5%; }
        .logo-text { font-size: 0.8rem; }
      }

    </style>
  </head>
