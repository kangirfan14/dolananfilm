<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>CREW DF | Dolanan Film</title>
    <!-- Favicon agar logo muncul di tab browser -->
    <link rel="icon" type="image/png" href="logdf.png" />
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet" />
    <style>
      :root {
        --p-pink: #ffdae9; 
        --p-blue: #d4f1f9; 
        --p-yellow: #fff4d1; 
        --p-purple: #e8dff5; 
        --p-green: #e1f7d5;
        --accent-red: #8b0000;
      }

      * { margin: 0; padding: 0; box-sizing: border-box; }
      
      body {
        /* Pattern Modern: Wave/Gelombang (Berbeda dari halaman lain) */
        background-color: #fdfaf5;
        background-image: url("data:image/svg+xml,%3Csvg width='100' height='20' viewBox='0 0 100 20' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M21.184 20c.357-.13.72-.264 1.088-.402l1.768-.661C33.64 15.347 39.647 14 50 14c10.271 0 15.362 1.222 24.629 4.928l2.105.842c.39.156.781.307 1.172.453l-2.003-2.003C67.756 12.822 62.244 12 50 12s-17.756.822-25.903 6.22l-2.913 2.78z' fill='%23000000' fill-opacity='0.05' fill-rule='evenodd'/%3E%3C/svg%3E");
        color: #000;
        font-family: 'Montserrat', sans-serif;
        line-height: 1.6;
        overflow-x: hidden;
      }

      /* --- NAVIGASI (Identik Index & Logika Scroll) --- */
      nav {
        display: flex; 
        justify-content: space-between; 
        align-items: center;
        background: #fff; /* Solid saat di atas */
        height: 80px;
        position: fixed; 
        width: 100%; 
        top: 0; 
        z-index: 2000;
        padding: 0 5%;
        border-bottom: 3px solid #000;
        transition: all 0.4s ease;
      }

      nav.scrolled {
        background: rgba(255, 255, 255, 0.7);
        backdrop-filter: blur(10px);
        height: 70px;
        border-bottom: 2px solid rgba(0,0,0,0.1);
      }

      /* Logo Pojok Kiri Atas (Mati/Tidak Bisa Diklik) --- */
      .nav-brand { 
        display: flex; 
        align-items: center; 
        gap: 12px; 
        pointer-events: none; 
        cursor: default;
      }
      .logo-img { width: 35px; height: 35px; object-fit: contain; }
      .logo-text { color: #000; font-weight: 900; font-size: 1.1rem; letter-spacing: 1px; }

      /* Tombol Navigasi Estetik */
      .btn-nav-home {
        background: #fff;
        border: 3px solid #000;
        color: #000;
        padding: 8px 20px;
        border-radius: 50px;
        font-weight: 900;
        font-size: 0.7rem;
        text-decoration: none;
        text-transform: uppercase;
        box-shadow: 4px 4px 0px #000;
        transition: 0.2s;
      }
      .btn-nav-home:hover { background: #000; color: #fff; box-shadow: 4px 4px 0px var(--accent-red); transform: translate(-2px,-2px); }

      /* --- HEADER SECTION --- */
      .crew-header {
        padding: 160px 5% 60px;
        text-align: center;
      }

      .title-main {
        font-size: clamp(2.5rem, 8vw, 4.5rem);
        font-weight: 900;
        background: var(--p-blue);
        display: inline-block;
        padding: 10px 30px;
        border: 4px solid #000;
        border-radius: 20px;
        box-shadow: 10px 10px 0px #000;
        margin-bottom: 40px;
        text-transform: uppercase;
      }

      .description-box {
        max-width: 800px;
        margin: 0 auto 50px;
        background: #fff;
        padding: 25px;
        border: 3px solid #000;
        border-radius: 20px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 1px;
      }

      .vision-mission-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
        gap: 25px;
        max-width: 1000px;
        margin: 0 auto;
      }

      .vm-card {
        background: #fff;
        padding: 30px;
        border-radius: 25px;
        border: 4px solid #000;
        text-align: left;
        box-shadow: 8px 8px 0px #000;
      }
      .vm-card:nth-child(1) { background: var(--p-yellow); }
      .vm-card:nth-child(2) { background: var(--p-purple); }
      .vm-card h3 { color: #000; margin-bottom: 10px; font-weight: 900; text-transform: uppercase; border-bottom: 3px solid #000; display: inline-block; }

      /* --- CREW GRID --- */
      .crew-section { padding: 80px 5%; max-width: 1200px; margin: 0 auto; }
      
      .crew-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
        gap: 40px;
      }

      .crew-card {
        background: #fff;
        padding: 15px;
        border-radius: 30px;
        border: 4px solid #000;
        box-shadow: 10px 10px 0px #000;
        transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        text-align: center;
      }
      .crew-card:hover { transform: translate(-5px,-5px); box-shadow: 15px 15px 0px var(--p-pink); }

      .crew-img-wrapper {
        width: 100%;
        aspect-ratio: 3/4;
        border-radius: 20px;
        overflow: hidden;
        margin-bottom: 15px;
        border: 3px solid #000;
        background: #eee;
      }

      .crew-img-wrapper img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        filter: grayscale(100%);
        transition: 0.5s;
      }
      .crew-card:hover img { filter: grayscale(0%); transform: scale(1.05); }

      .crew-info h4 { font-size: 1.3rem; font-weight: 900; margin-bottom: 5px; text-transform: uppercase; }
      .crew-info p { color: var(--accent-red); font-size: 0.8rem; font-weight: 900; text-transform: uppercase; letter-spacing: 1px; }

      /* --- FOOTER BUTTON --- */
      .btn-back-bottom {
        display: inline-block;
        background: #fff;
        border: 4px solid #000;
        padding: 18px 45px;
        border-radius: 50px;
        text-decoration: none;
        color: #000;
        font-weight: 900;
        text-transform: uppercase;
        letter-spacing: 2px;
        box-shadow: 8px 8px 0px #000;
        transition: 0.2s;
      }
      .btn-back-bottom:hover { background: #000; color: #fff; box-shadow: 8px 8px 0px var(--p-green); transform: translate(-3px,-3px); }

      @media (max-width: 768px) {
        .container { padding: 120px 5% 40px; }
        .crew-grid { grid-template-columns: repeat(2, 1fr); gap: 20px; }
        .logo-text { font-size: 0.9rem; }
      }
    </style>
  </head>

    <script>
        // LOGIKA NAVBAR: SOLID DI ATAS, TRANSPARAN SAAT SCROLL[cite: 7]
        window.onscroll = function() {
            const nav = document.getElementById('navbar');
