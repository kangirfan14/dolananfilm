<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detail Event | DOLANAN FILM</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-dark: #0a0a0a;
            --accent-gold: #c5a059;
            --text-light: #ffffff;
            --text-gray: #a0a0a0;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: var(--primary-dark);
            color: var(--text-light);
            font-family: 'Montserrat', sans-serif;
            padding: 80px 10%;
        }

        .back-link {
            color: var(--accent-gold);
            text-decoration: none;
            font-size: 0.75rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            display: inline-block;
            margin-bottom: 50px;
        }

        .event-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 60px;
            align-items: start;
        }

        h1 { font-size: 3rem; letter-spacing: 6px; margin-bottom: 30px; }
        h3 { color: var(--accent-gold); margin: 30px 0 10px; text-transform: uppercase; letter-spacing: 2px; }
        p { color: var(--text-gray); line-height: 1.8; margin-bottom: 20px; }

        /* --- STYLING PAMFLET 1080x1350 --- */
        .registration-area { text-align: center; }
        .pamflet-register-img {
            width: 100%;
            max-width: 432px; /* Skala tampilan agar proporsional di layar */
            aspect-ratio: 1080 / 1350; /* Rasio 4:5 Pakem */
            object-fit: cover;
            border: 1px solid var(--accent-gold);
            border-radius: 8px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
            transition: 0.4s;
            cursor: pointer;
        }
        .pamflet-register-img:hover { transform: scale(1.02); border-color: white; }

        @media (max-width: 900px) {
            .event-grid { grid-template-columns: 1fr; }
            h1 { font-size: 2rem; }
        }
    </style>
</head>
<body>
    <a href="index.html" class="back-link">← KEMBALI KE BERANDA</a>
    
    <div class="event-grid">
        <div class="info-column">
            <p style="color: var(--accent-gold); letter-spacing: 4px;">Nama Acara</p>
            <h1>Nyabar Vol.3 2026</h1>
            
            <h3>Tema Acara</h3>
            <p>"COMING SOON.</p>
            
            <h3>Waktu & Lokasi</h3>
            <p>COMING SOON</p>

            <h3>Informasi</h3>
            <p>COMING SOON.</p>
        </div>

        <div class="registration-area">
            <a href="https://www.instagram.com/dolanan_film/" target="_blank">
                <!-- Ganti src dengan file pamflet 1080x1350 asli Anda -->
                <img src="https://images.unsplash.com/photo-1536440136628-849c177e76a1?q=80&w=1080" alt="Pamflet Pendaftaran" class="pamflet-register-img">
            </a>
            <p style="margin-top: 20px; font-size: 0.8rem; color: var(--accent-gold); letter-spacing: 2px;">KLIK GAMBAR UNTUK INFO SELENGKAPNYA</p>
        </div>
    </div>
</body>
</html>
